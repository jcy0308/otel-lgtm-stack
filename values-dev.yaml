# =============================================================================
# Observability Stack - Development Values
# =============================================================================
# Optimized for a 2-node on-prem development cluster.
#
# Cluster profile:
#   - 1 control-plane node (also schedulable) + 1 worker node
#   - Node spec: Intel Xeon E5-2620 v4, 32 vCPU, 128Gi memory
#
# Usage:
#   helm install observability . -f values-dev.yaml
# =============================================================================

global:
  clusterName: "dev-cluster"
  environment: "development"
  # -- On-prem storage class.
  storageClass: "local-path"
  imagePullSecrets: []
  objectStorage:
    minio:
      # -- External MinIO S3 API endpoint used by Loki/Tempo/Mimir.
      endpoint: "minio.example.com:9000"
      accessKey: "CHANGE_ME_MINIO_ACCESS_KEY"
      secretKey: "CHANGE_ME_MINIO_SECRET_KEY"
      insecure: true
      forcePathStyle: true
      buckets:
        loki: "loki"
        tempo: "tempo"
        mimir: "mimir"

namespace:
  create: true

# =============================================================================
# Grafana - Development
# =============================================================================
grafana:
  enabled: true
  # -- Grafana runs as a single replica in dev.
  replicas: 1

  image:
    repository: grafana/grafana
    tag: "11.4.0"

  adminUser: admin
  # -- Override with a secure password in private values.
  adminPassword: "CHANGE_ME_STRONG_PASSWORD"
  anonymousAuth: false
  rootUrl: "https://grafana.dev.example.com"
  logLevel: info

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 2Gi

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: true
    ingressClassName: nginx
    host: grafana.dev.example.com
    tls: true
    tlsSecret: grafana-tls
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"

  # -- Allow scheduling on control-plane in small clusters.
  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}

# =============================================================================
# Loki - Development (Monolithic)
# =============================================================================
loki:
  enabled: true
  # -- Monolithic Loki in dev.
  replicas: 1

  image:
    repository: grafana/loki
    tag: "3.3.2"

  config:
    authEnabled: false
    logLevel: info
    # -- Replication factor is 1 for single-replica dev mode.
    replicationFactor: 1
    retentionPeriod: "2160h"        # 90 days (3 months)
    cacheSize: 100
    ingestionRateMb: 10
    ingestionBurstSizeMb: 20
    maxStreamsPerUser: 5000
    maxQuerySeries: 300

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 5Gi

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity:
    podAntiAffinity:
      # -- Soft anti-affinity to spread when possible.
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: loki
            topologyKey: kubernetes.io/hostname

# =============================================================================
# Tempo - Development (Monolithic)
# =============================================================================
tempo:
  enabled: true
  # -- Monolithic Tempo in dev.
  replicas: 1

  image:
    repository: grafana/tempo
    tag: "2.6.1"

  config:
    logLevel: info
    replicationFactor: 1
    retentionPeriod: "2160h"        # 90 days (3 months)
    maxBlockDuration: "5m"
    maxBlockBytes: 268435456        # 256MiB

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 5Gi

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: tempo
            topologyKey: kubernetes.io/hostname

# =============================================================================
# VictoriaMetrics - Development (Disabled, fallback only)
# =============================================================================
victoriaMetrics:
  enabled: false
  # -- Keep disabled; Mimir is the default metrics backend.
  replicas: 1

  image:
    repository: victoriametrics/victoria-metrics
    tag: "v1.137.0"

  config:
    retentionPeriod: "7d"

  resources:
    requests:
      cpu: 300m
      memory: 768Mi
    limits:
      cpu: 1500m
      memory: 2Gi

  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi

  service:
    httpPort: 8428

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: victoria-metrics
            topologyKey: kubernetes.io/hostname

# =============================================================================
# Grafana Mimir - Development (Monolithic)
# =============================================================================
mimir:
  enabled: true
  replicas: 1

  image:
    repository: grafana/mimir
    tag: "2.17.7"

  config:
    logLevel: info
    retentionPeriod: "2160h"        # 90 days (3 months)
    outOfOrderTimeWindow: "2m"

  resources:
    requests:
      cpu: 300m
      memory: 768Mi
    limits:
      cpu: 1500m
      memory: 2Gi

  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi

  service:
    httpPort: 9009

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: mimir
            topologyKey: kubernetes.io/hostname

# =============================================================================
# OpenTelemetry Collector - Development
# =============================================================================
otelCollector:
  enabled: true

  # -- DaemonSet: one collector per node for host metrics and logs.
  kind: DaemonSet
  # replicas: ignored for DaemonSet.
  replicas: 1

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.115.1"

  goMemLimit: "256MiB"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP

  hostNetwork: false
  hostPort: false

  config:
    logLevel: info
    debug: false

    # -- Batch tuning.
    batchSize: 4096
    batchTimeout: "5s"
    batchMaxSize: 8192

    memoryLimitPercentage: 80
    memorySpikePercentage: 25

    maxRecvMsgSizeMib: 4

    # -- Receivers.
    prometheusReceiver:
      enabled: true
      externalScrapeTargets:
        mysql:
          enabled: false
          jobName: onprem-mysql
          scrapeInterval: 30s
          metricsPath: /metrics
          targets: []
        additionalJobs: []

    k8sEventsReceiver:
      enabled: true

    hostMetricsReceiver:
      enabled: true      # Host metrics are collected from each node.

    kubeletStatsReceiver:
      enabled: true

    # -- Filelog receiver for pod logs on each node.
    filelogReceiver:
      enabled: true
      includeFilePath: true
      includePaths:
        - /var/log/pods/*/*/*.log
      excludePaths:
        - /var/log/pods/*/otel-collector/*.log
      operators:
        - type: container
          id: container-parser

    # -- Processors.
    k8sAttributesProcessor:
      enabled: true

    filterProcessor:
      enabled: true
      metricFilters:
        # Example metric filter.
        - 'name == "k8s.container.cpu_limit" or name == "k8s.container.memory_limit"'

    # -- Retry/queue to reduce data loss.
    exporterRetry:
      enabled: true

    exporterQueue:
      enabled: true
      numConsumers: 2
      queueSize: 1000

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  # -- Anti-affinity is not required for DaemonSet.
  affinity: {}

# =============================================================================
# Kube State Metrics - Development
# =============================================================================
kubeStateMetrics:
  enabled: true
  replicas: 1

  image:
    repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
    tag: "v2.13.0"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

  service:
    type: ClusterIP
    port: 8080
    telemetryPort: 8081

  # -- Resource types to collect.
  collectors:
    - pods
    - deployments
    - statefulsets
    - daemonsets
    - replicasets
    - nodes
    - namespaces
    - jobs
    - cronjobs
    - services
    - endpoints
    - persistentvolumeclaims
    - persistentvolumes
    - configmaps
    - secrets
    - resourcequotas
    - horizontalpodautoscalers
    - ingresses

  metricLabelsAllowlist:
    pods:
      - app.kubernetes.io/name
      - app.kubernetes.io/instance
      - app.kubernetes.io/component
    deployments:
      - app.kubernetes.io/name
      - app.kubernetes.io/instance

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}

# =============================================================================
# Node Exporter - Development (DaemonSet)
# =============================================================================
nodeExporter:
  enabled: true

  hostNetwork: false
  hostPort: false

  image:
    repository: prom/node-exporter
    tag: "v1.8.2"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

  service:
    type: ClusterIP
    port: 9100

  enabledCollectors:
    - cpu
    - diskstats
    - filesystem
    - loadavg
    - meminfo
    - netdev
    - netstat
    - os
    - stat
    - time
    - uname
    - vmstat
    - hwmon
    - thermal_zone
    - pressure

  disabledCollectors:
    - arp
    - bcache
    - bonding
    - btrfs
    - conntrack
    - edac
    - entropy
    - fibrechannel
    - infiniband
    - ipvs
    - mdadm
    - nfs
    - nfsd
    - nvme
    - powersupplyclass
    - rapl
    - schedstat
    - sockstat
    - softnet
    - tapestats
    - textfile
    - wifi
    - xfs
    - zfs

  hostPaths:
    proc: /proc
    sys: /sys
    rootfs: /

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}
