# =============================================================================
# Observability Stack - Production Values
# =============================================================================
# Optimized for a 3-node on-prem production cluster.
#
# Cluster profile:
#   - 1 control-plane node (also schedulable) + 2 worker nodes
#   - Node spec: Intel Xeon E5-2620 v4, 32 vCPU, 128Gi memory
#
# Usage:
#   helm install observability . -f values-prod.yaml
# =============================================================================

global:
  clusterName: "prod-cluster"
  environment: "production"
  # -- On-prem storage class.
  storageClass: "local-path"
  imagePullSecrets: []
  objectStorage:
    minio:
      # -- External MinIO S3 API endpoint used by Loki/Tempo/Mimir.
      endpoint: "minio.example.com:9000"
      accessKey: "CHANGE_ME_MINIO_ACCESS_KEY"
      secretKey: "CHANGE_ME_MINIO_SECRET_KEY"
      insecure: true
      forcePathStyle: true
      buckets:
        loki: "loki"
        tempo: "tempo"
        mimir: "mimir"

namespace:
  create: true

# =============================================================================
# Grafana - Production
# =============================================================================
grafana:
  enabled: true
  # -- Grafana runs as a single replica.
  replicas: 1

  image:
    repository: grafana/grafana
    tag: "11.4.0"

  adminUser: admin
  # -- Set via private values with a strong password.
  adminPassword: "CHANGE_ME_STRONG_PASSWORD"
  anonymousAuth: false
  rootUrl: "https://grafana.prod.example.com"
  logLevel: info

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: true
    ingressClassName: nginx
    host: grafana.prod.example.com
    tls: true
    tlsSecret: grafana-tls
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "600"

  # -- Allow scheduling on control-plane in small clusters.
  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}

# =============================================================================
# Loki - Production (Distributed Single-Binary Ring)
# =============================================================================
loki:
  enabled: true
  # -- Multi-replica Loki with memberlist ring.
  replicas: 3

  image:
    repository: grafana/loki
    tag: "3.3.2"

  config:
    authEnabled: false
    logLevel: info
    # -- Replication factor for ring-based HA.
    replicationFactor: 2
    retentionPeriod: "720h"         # 30 days
    cacheSize: 300
    ingestionRateMb: 30
    ingestionBurstSizeMb: 60
    maxStreamsPerUser: 30000
    maxQuerySeries: 1500
    gossipPort: 7946

  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 6Gi

  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 50Gi

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity:
    podAntiAffinity:
      # -- Soft anti-affinity to spread when possible.
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: loki
            topologyKey: kubernetes.io/hostname

# =============================================================================
# Tempo - Production (Distributed Single-Binary Ring)
# =============================================================================
tempo:
  enabled: true
  # -- Multi-replica Tempo with memberlist ring.
  replicas: 3

  image:
    repository: grafana/tempo
    tag: "2.6.1"

  config:
    logLevel: info
    replicationFactor: 2
    retentionPeriod: "336h"         # 14 days
    maxBlockDuration: "5m"
    maxBlockBytes: 1073741824       # 1GiB
    gossipPort: 7946

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 3000m
      memory: 6Gi

  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 50Gi

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: tempo
            topologyKey: kubernetes.io/hostname

# =============================================================================
# VictoriaMetrics - Production (Disabled, fallback only)
# =============================================================================
victoriaMetrics:
  enabled: false
  # -- Keep disabled; Mimir is the default metrics backend.
  mode: cluster

  image:
    repository: victoriametrics/victoria-metrics
    tag: "v1.137.0"

  config:
    retentionPeriod: "90d"

  resources:
    requests:
      cpu: 1500m
      memory: 4Gi
    limits:
      cpu: 6000m
      memory: 12Gi

  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 100Gi

  service:
    httpPort: 8428

  cluster:
    # -- Example cluster sizing for fallback usage.
    replicationFactor: 2
    dedupMinScrapeInterval: 15s

    vminsert:
      replicas: 2
      service:
        httpPort: 8480

    vmselect:
      replicas: 2
      service:
        httpPort: 8481

    vmstorage:
      replicas: 3
      service:
        httpPort: 8482
        vminsertPort: 8400
        vmselectPort: 8401

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: victoria-metrics
            topologyKey: kubernetes.io/hostname

# =============================================================================
# Grafana Mimir - Production (Monolithic)
# =============================================================================
mimir:
  enabled: true
  # -- Monolithic Mimir is intentionally single replica.
  replicas: 1

  image:
    repository: grafana/mimir
    tag: "2.17.7"

  config:
    logLevel: info

  resources:
    requests:
      cpu: 1500m
      memory: 4Gi
    limits:
      cpu: 6000m
      memory: 12Gi

  persistence:
    enabled: true
    accessMode: ReadWriteOnce
    size: 100Gi

  service:
    httpPort: 9009

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: mimir
            topologyKey: kubernetes.io/hostname

# =============================================================================
# OpenTelemetry Collector - Production
# =============================================================================
otelCollector:
  enabled: true

  # -- DaemonSet: one collector per node for host metrics and logs.
  kind: DaemonSet
  # replicas: ignored for DaemonSet.
  replicas: 2

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.115.1"

  goMemLimit: "1200MiB"

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1536Mi

  service:
    type: ClusterIP

  config:
    logLevel: info
    debug: false

    # -- Batch tuning for higher throughput.
    batchSize: 16384
    batchTimeout: "1s"
    batchMaxSize: 32768

    memoryLimitPercentage: 80
    memorySpikePercentage: 25

    maxRecvMsgSizeMib: 8

    # -- Receivers.
    prometheusReceiver:
      enabled: true
      externalScrapeTargets:
        mysql:
          enabled: false
          jobName: onprem-mysql
          scrapeInterval: 30s
          metricsPath: /metrics
          targets:
            - endpoint: 10.10.20.15:9104
              labels:
                service_name: mysql-exporter
                env: prod
                system: onprem
                db_name: mysql-main
        additionalJobs:
          - enabled: false
            jobName: external-node-exporter
            scrapeInterval: 30s
            metricsPath: /metrics
            targets:
              - endpoint: 10.10.30.20:9100
                labels:
                  service_name: node-exporter
                  env: prod
                  system: external

    k8sEventsReceiver:
      enabled: true

    hostMetricsReceiver:
      enabled: true      # Host metrics are collected from each node.

    kubeletStatsReceiver:
      enabled: true

    # -- Filelog receiver for pod logs on each node.
    filelogReceiver:
      enabled: true
      includeFilePath: true
      includePaths:
        - /var/log/pods/*/*/*.log
      excludePaths:
        - /var/log/pods/*/otel-collector/*.log
      operators:
        - type: container
          id: container-parser

    # -- Processors.
    k8sAttributesProcessor:
      enabled: true

    filterProcessor:
      enabled: true
      metricFilters:
        # Example metric filter.
        - 'name == "k8s.container.cpu_limit" or name == "k8s.container.memory_limit"'

    # -- Retry/queue to reduce data loss.
    exporterRetry:
      enabled: true

    exporterQueue:
      enabled: true
      numConsumers: 10
      queueSize: 5000

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  # -- Anti-affinity is not required for DaemonSet.
  affinity: {}

# =============================================================================
# Kube State Metrics - Production
# =============================================================================
kubeStateMetrics:
  enabled: true
  replicas: 1

  image:
    repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
    tag: "v2.13.0"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    port: 8080
    telemetryPort: 8081

  # -- Resource types to collect.
  collectors:
    - pods
    - deployments
    - statefulsets
    - daemonsets
    - replicasets
    - nodes
    - namespaces
    - jobs
    - cronjobs
    - services
    - endpoints
    - persistentvolumeclaims
    - persistentvolumes
    - configmaps
    - secrets
    - resourcequotas
    - horizontalpodautoscalers
    - ingresses

  metricLabelsAllowlist:
    pods:
      - app.kubernetes.io/name
      - app.kubernetes.io/instance
      - app.kubernetes.io/component
    deployments:
      - app.kubernetes.io/name
      - app.kubernetes.io/instance

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}

# =============================================================================
# Node Exporter - Production (DaemonSet)
# =============================================================================
nodeExporter:
  enabled: true

  image:
    repository: prom/node-exporter
    tag: "v1.8.2"

  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  service:
    type: ClusterIP
    port: 9100

  enabledCollectors:
    - cpu
    - diskstats
    - filesystem
    - loadavg
    - meminfo
    - netdev
    - netstat
    - os
    - stat
    - time
    - uname
    - vmstat
    - hwmon
    - thermal_zone
    - pressure

  disabledCollectors:
    - arp
    - bcache
    - bonding
    - btrfs
    - conntrack
    - edac
    - entropy
    - fibrechannel
    - infiniband
    - ipvs
    - mdadm
    - nfs
    - nfsd
    - nvme
    - powersupplyclass
    - rapl
    - schedstat
    - sockstat
    - softnet
    - tapestats
    - textfile
    - wifi
    - xfs
    - zfs

  hostPaths:
    proc: /proc
    sys: /sys
    rootfs: /

  nodeSelector: {}
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  affinity: {}
