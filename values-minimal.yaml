# =============================================================================
# Observability Stack - Minimal Values (개발/테스트 환경)
# =============================================================================
# 최소 리소스로 동작하는 설정입니다.
# 단일 레플리카, 퍼시스턴스 비활성화, 짧은 보존 기간을 사용합니다.
#
# 사용법:
#   helm install observability . -f values-minimal.yaml
# =============================================================================

global:
  clusterName: "dev-cluster"
  environment: "development"
  storageClass: ""

# =============================================================================
# Grafana - 최소 리소스
# =============================================================================
grafana:
  enabled: true
  replicas: 1

  image:
    repository: grafana/grafana
    tag: "11.4.0"

  adminUser: admin
  adminPassword: admin123
  logLevel: warn

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  persistence:
    enabled: false

  service:
    type: NodePort
    port: 3000
    nodePort: 30300

  ingress:
    enabled: false

# =============================================================================
# Loki - 최소 리소스
# =============================================================================
loki:
  enabled: true
  replicas: 1

  image:
    repository: grafana/loki
    tag: "3.3.2"

  config:
    authEnabled: false
    logLevel: warn
    replicationFactor: 1
    retentionPeriod: "24h"          # 1일만 보존
    cacheSize: 50
    ingestionRateMb: 5
    ingestionBurstSizeMb: 10
    maxStreamsPerUser: 5000
    maxQuerySeries: 200

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: false

# =============================================================================
# Tempo - 최소 리소스
# =============================================================================
tempo:
  enabled: true
  replicas: 1

  image:
    repository: grafana/tempo
    tag: "2.6.1"

  config:
    logLevel: warn
    retentionPeriod: "24h"          # 1일만 보존
    maxBlockDuration: "10m"
    maxBlockBytes: 536870912        # 512MB

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  persistence:
    enabled: false

# =============================================================================
# Mimir - 최소 리소스
# =============================================================================
mimir:
  enabled: true
  replicas: 1

  image:
    repository: grafana/mimir
    tag: "2.14.2"

  config:
    multitenancyEnabled: false
    logLevel: warn
    replicationFactor: 1
    retentionPeriod: "24h"          # 1일만 보존
    maxGlobalSeriesPerUser: 50000
    maxGlobalSeriesPerMetric: 5000
    ingestionRate: 5000
    ingestionBurstSize: 50000

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  persistence:
    enabled: false

# =============================================================================
# OpenTelemetry Collector - 최소 리소스
# =============================================================================
otelCollector:
  enabled: true
  kind: Deployment
  replicas: 1

  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.115.1"

  goMemLimit: "200MiB"

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  config:
    logLevel: warn
    debug: false

    batchSize: 4096
    batchTimeout: "5s"
    batchMaxSize: 8192

    memoryLimitPercentage: 75
    memorySpikePercentage: 20

    # -- 최소 구성에서는 기본 OTLP receiver만 사용
    prometheusReceiver:
      enabled: false

    k8sEventsReceiver:
      enabled: false

    hostMetricsReceiver:
      enabled: false

    kubeletStatsReceiver:
      enabled: false

    k8sAttributesProcessor:
      enabled: false

    filterProcessor:
      enabled: false

    exporterRetry:
      enabled: true

    exporterQueue:
      enabled: false
