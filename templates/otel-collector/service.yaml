{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observability.fullname" . }}-otel-collector
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
spec:
  type: {{ .Values.otelCollector.service.type | default "ClusterIP" }}
  ports:
    - port: 4317
      targetPort: otlp-grpc
      protocol: TCP
      name: otlp-grpc
    - port: 4318
      targetPort: otlp-http
      protocol: TCP
      name: otlp-http
    - port: 13133
      targetPort: healthcheck
      protocol: TCP
      name: healthcheck
    - port: 8888
      targetPort: metrics
      protocol: TCP
      name: metrics
    - port: 55679
      targetPort: zpages
      protocol: TCP
      name: zpages
  selector:
    {{- include "observability.selectorLabels" (dict "name" "otel-collector" "instance" .Release.Name) | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "observability.fullname" . }}-otel-collector
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-collector
{{- end }}
