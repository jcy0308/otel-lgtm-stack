{{- if .Values.victoriaMetrics.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "observability.fullname" . }}-vm
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoria-metrics
spec:
  replicas: {{ .Values.victoriaMetrics.replicas | default 1 }}
  serviceName: {{ include "observability.fullname" . }}-vm
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "observability.selectorLabels" (dict "name" "vm" "instance" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "observability.selectorLabels" (dict "name" "vm" "instance" .Release.Name) | nindent 8 }}
        {{- include "observability.labels" . | nindent 8 }}
        app.kubernetes.io/component: victoria-metrics
    spec:
      {{- include "observability.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "observability.fullname" . }}-vm
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: victoria-metrics
          image: "{{ .Values.victoriaMetrics.image.repository }}:{{ .Values.victoriaMetrics.image.tag }}"
          imagePullPolicy: {{ .Values.victoriaMetrics.image.pullPolicy | default "IfNotPresent" }}
          args:
            - -storageDataPath=/victoria-metrics-data
            - -retentionPeriod={{ .Values.victoriaMetrics.config.retentionPeriod | default "7d" }}
            - -httpListenAddr=:{{ .Values.victoriaMetrics.service.httpPort | default 8428 }}
          ports:
            - name: http
              containerPort: {{ .Values.victoriaMetrics.service.httpPort | default 8428 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.victoriaMetrics.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /victoria-metrics-data
      {{- with .Values.victoriaMetrics.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.victoriaMetrics.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.victoriaMetrics.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.victoriaMetrics.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.victoriaMetrics.persistence.accessMode | default "ReadWriteOnce" }}
        {{- include "observability.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.victoriaMetrics.persistence.size | default "10Gi" }}
  {{- else }}
      volumeClaimTemplates: []
  {{- end }}
{{- end }}
