{{- if .Values.victoriaMetrics.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability.fullname" . }}-vm-config
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoria-metrics
data:
  placeholder: |
    victoria-metrics uses command-line flags; this ConfigMap is reserved for future overrides.
{{- end }}
