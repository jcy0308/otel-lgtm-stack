{{- if .Values.mimir.enabled }}
{{- $minio := .Values.global.objectStorage.minio | default dict }}
{{- $mimirBucket := dig "buckets" "mimir" "mimir" $minio }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability.fullname" . }}-mimir-config
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: mimir
data:
  mimir.yaml: |
    # 모놀리식(single-binary) Mimir 설정
    multitenancy_enabled: false

    common:
      storage:
        backend: s3
        s3:
          endpoint: {{ $minio.endpoint | quote }}
          bucket_name: {{ $mimirBucket | quote }}
          access_key_id: {{ $minio.accessKey | quote }}
          secret_access_key: {{ $minio.secretKey | quote }}
          insecure: {{ $minio.insecure | default false }}

    blocks_storage:
      storage_prefix: blocks
      bucket_store:
        sync_dir: /var/mimir/tsdb-sync
      tsdb:
        dir: /var/mimir/tsdb

    compactor:
      data_dir: /var/mimir/compactor
      sharding_ring:
        kvstore:
          store: memberlist
    {{- if .Values.mimir.config.retentionPeriod }}

    limits:
      compactor_blocks_retention_period: {{ .Values.mimir.config.retentionPeriod | quote }}
    {{- end }}

    distributor:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist

    ingester:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
        replication_factor: 1

    ruler_storage:
      backend: s3
      s3:
        endpoint: {{ $minio.endpoint | quote }}
        bucket_name: {{ $mimirBucket | quote }}
        access_key_id: {{ $minio.accessKey | quote }}
        secret_access_key: {{ $minio.secretKey | quote }}
        insecure: {{ $minio.insecure | default false }}

    ruler:
      rule_path: /var/mimir/rules

    server:
      http_listen_port: {{ .Values.mimir.service.httpPort | default 9009 }}
      log_level: {{ .Values.mimir.config.logLevel | default "info" }}

    store_gateway:
      sharding_ring:
        replication_factor: 1
{{- end }}
