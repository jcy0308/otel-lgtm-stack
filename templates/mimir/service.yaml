{{- if .Values.victoriaMetrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observability.fullname" . }}-vm
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoria-metrics
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.victoriaMetrics.service.httpPort | default 8428 }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "observability.selectorLabels" (dict "name" "vm" "instance" .Release.Name) | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "observability.fullname" . }}-vm
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoria-metrics
{{- end }}
