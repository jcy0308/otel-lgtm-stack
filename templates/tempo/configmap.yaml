{{- if .Values.tempo.enabled }}
{{- $minio := .Values.global.objectStorage.minio | default dict }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability.fullname" . }}-tempo-config
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: tempo
data:
  tempo.yaml: |
    server:
      http_listen_port: {{ .Values.tempo.service.httpPort | default 3200 }}
      grpc_listen_port: {{ .Values.tempo.service.grpcPort | default 9095 }}
      log_level: {{ .Values.tempo.config.logLevel | default "info" }}

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"

    {{- if gt (int (.Values.tempo.replicas | default 1)) 1 }}
    memberlist:
      bind_port: {{ .Values.tempo.config.gossipPort | default 7946 }}
      join_members:
        - {{ include "observability.fullname" . }}-tempo-headless.{{ include "observability.namespace" . }}.svc.cluster.local:{{ .Values.tempo.config.gossipPort | default 7946 }}
    {{- end }}

    ingester:
      lifecycler:
        ring:
          kvstore:
            store: {{ if gt (int (.Values.tempo.replicas | default 1)) 1 }}memberlist{{ else }}inmemory{{ end }}
          replication_factor: {{ .Values.tempo.config.replicationFactor | default 1 }}
      max_block_duration: {{ .Values.tempo.config.maxBlockDuration | default "5m" }}
      max_block_bytes: {{ .Values.tempo.config.maxBlockBytes | default 1073741824 }}

    compactor:
      compaction:
        block_retention: {{ .Values.tempo.config.retentionPeriod | default "168h" }}

    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: {{ .Values.global.clusterName | default "on-prem" }}
      storage:
        path: /var/tempo/generator/wal
        remote_write:
        {{- if .Values.victoriaMetrics.enabled }}
          - url: http://{{ if eq (.Values.victoriaMetrics.mode | default "single") "cluster" }}{{ include "observability.fullname" . }}-vm-insert:{{ .Values.victoriaMetrics.cluster.vminsert.service.httpPort }}/insert/0/prometheus{{ else }}{{ include "observability.fullname" . }}-vm:{{ .Values.victoriaMetrics.service.httpPort }}{{ end }}/api/v1/write
            send_exemplars: true
        {{- end }}
      traces_storage:
        path: /var/tempo/generator/traces

    storage:
      trace:
        backend: {{ .Values.tempo.storage.backend | default "local" }}
        wal:
          path: /var/tempo/wal
        {{- if eq (.Values.tempo.storage.backend | default "local") "s3" }}
        s3:
          bucket: {{ .Values.tempo.storage.minio.bucket | quote }}
          endpoint: {{ $minio.endpoint | quote }}
          access_key: {{ $minio.accessKey | quote }}
          secret_key: {{ $minio.secretKey | quote }}
          insecure: {{ $minio.insecure | default false }}
          forcepathstyle: {{ $minio.forcePathStyle | default true }}
        {{- else }}
        local:
          path: /var/tempo/blocks
        {{- end }}
        block:
          bloom_filter_false_positive: 0.05
          v2_index_downsample_bytes: 1000
          v2_encoding: zstd

    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
          generate_native_histograms: both

    usage_report:
      reporting_enabled: false
{{- end }}
