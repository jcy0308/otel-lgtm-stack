{{- if .Values.loki.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observability.fullname" . }}-loki
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.loki.service.httpPort | default 3100 }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.loki.service.grpcPort | default 9096 }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "observability.selectorLabels" (dict "name" "loki" "instance" .Release.Name) | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "observability.fullname" . }}-loki-headless
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.loki.service.httpPort | default 3100 }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.loki.service.grpcPort | default 9096 }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    {{- include "observability.selectorLabels" (dict "name" "loki" "instance" .Release.Name) | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "observability.fullname" . }}-loki
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
{{- end }}
