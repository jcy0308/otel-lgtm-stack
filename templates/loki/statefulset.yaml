{{- if .Values.loki.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "observability.fullname" . }}-loki
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  replicas: {{ .Values.loki.replicas | default 1 }}
  serviceName: {{ include "observability.fullname" . }}-loki-headless
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "observability.selectorLabels" (dict "name" "loki" "instance" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "observability.selectorLabels" (dict "name" "loki" "instance" .Release.Name) | nindent 8 }}
        {{- include "observability.labels" . | nindent 8 }}
        app.kubernetes.io/component: loki
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/loki/configmap.yaml") . | sha256sum }}
    spec:
      {{- include "observability.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "observability.fullname" . }}-loki
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: loki
          image: "{{ .Values.loki.image.repository }}:{{ .Values.loki.image.tag }}"
          imagePullPolicy: {{ .Values.loki.image.pullPolicy | default "IfNotPresent" }}
          args:
            - -config.file=/etc/loki/loki.yaml
            - -target=all
          ports:
            - name: http
              containerPort: {{ .Values.loki.service.httpPort | default 3100 }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.loki.service.grpcPort | default 9096 }}
              protocol: TCP
            - name: gossip
              containerPort: {{ .Values.loki.config.gossipPort | default 7946 }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: {{ include "observability.fullname" . }}-loki-config
        {{- if not .Values.loki.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.loki.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.loki.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.loki.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.loki.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.loki.persistence.accessMode | default "ReadWriteOnce" }}
        {{- include "observability.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.loki.persistence.size | default "10Gi" }}
  {{- end }}
{{- end }}
