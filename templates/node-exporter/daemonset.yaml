{{- if .Values.nodeExporter.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "observability.fullname" . }}-node-exporter
  namespace: {{ include "observability.namespace" . }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-exporter
spec:
  selector:
    matchLabels:
      {{- include "observability.selectorLabels" (dict "name" "node-exporter" "instance" .Release.Name) | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        {{- include "observability.selectorLabels" (dict "name" "node-exporter" "instance" .Release.Name) | nindent 8 }}
        {{- include "observability.labels" . | nindent 8 }}
        app.kubernetes.io/component: node-exporter
    spec:
      {{- include "observability.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "observability.fullname" . }}-node-exporter
      automountServiceAccountToken: false
      hostNetwork: {{ if hasKey .Values.nodeExporter "hostNetwork" }}{{ .Values.nodeExporter.hostNetwork }}{{ else }}true{{ end }}
      hostPID: true
      dnsPolicy: {{ if (and (hasKey .Values.nodeExporter "hostNetwork") (not .Values.nodeExporter.hostNetwork)) }}ClusterFirst{{ else }}ClusterFirstWithHostNet{{ end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: node-exporter
          image: "{{ .Values.nodeExporter.image.repository }}:{{ .Values.nodeExporter.image.tag }}"
          imagePullPolicy: {{ .Values.nodeExporter.image.pullPolicy | default "IfNotPresent" }}
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --web.listen-address=:{{ .Values.nodeExporter.service.port | default 9100 }}
            - --web.disable-exporter-metrics
            {{- range .Values.nodeExporter.enabledCollectors }}
            - --collector.{{ . }}
            {{- end }}
            {{- range .Values.nodeExporter.disabledCollectors }}
            - --no-collector.{{ . }}
            {{- end }}
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
            - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs|tmpfs)$
          ports:
            - name: metrics
              containerPort: {{ .Values.nodeExporter.service.port | default 9100 }}
              {{- if (or (not (hasKey .Values.nodeExporter "hostPort")) .Values.nodeExporter.hostPort) }}
              hostPort: {{ .Values.nodeExporter.service.port | default 9100 }}
              {{- end }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.nodeExporter.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - SYS_TIME
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: {{ .Values.nodeExporter.hostPaths.proc | default "/proc" }}
        - name: sys
          hostPath:
            path: {{ .Values.nodeExporter.hostPaths.sys | default "/sys" }}
        - name: root
          hostPath:
            path: {{ .Values.nodeExporter.hostPaths.rootfs | default "/" }}
      {{- with .Values.nodeExporter.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeExporter.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
